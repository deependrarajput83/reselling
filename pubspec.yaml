name: reselling_new
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  icons_plus: ^5.0.0
  font_awesome_flutter: ^10.7.0
  fl_chart: ^1.1.1
  dotted_border: ^2.1.0
  image_picker: ^1.2.1
  dots_indicator: ^4.0.1
  carousel_slider: ^5.1.1
  flutter_svg: ^2.2.4
  shimmer: ^3.0.0
  flutter_gif: ^0.0.4
  animated_text_kit: ^4.3.0
  shared_preferences: ^2.5.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: poppins
      fonts:
        - asset: image/fonts/Poppins-Regular.ttf
        - asset: image/fonts/Poppins-Bold.ttf
  assets:
    - image/imageasstes/
    - image/svgicon/